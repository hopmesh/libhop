# Sync a public PR opened on this mirror back to the Hop monorepo (the source of truth). The PR is a
# public discussion HERE; this workflow asks the monorepo to import it as a monorepo PR, which is where
# it gets MERGED (monorepo main is branch-protected). The export then cascades the merged change back out
# to this repo. Internal work is the mirror image: discussed + merged on a monorepo PR, cascaded out.
#
# The export cascades out as a push, which does not fire PR events, so this never loops, no guard needed.
# This file is carried in from the monorepo subtree by Copybara. Edit it in the monorepo, never here.
name: Sync back to the monorepo

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  request-import:
    environment:
      name: component-sync
    runs-on: ubuntu-latest
    steps:
      - name: Mint canonical-repository dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.HOP_SYNC_APP_ID }}
          private-key: ${{ secrets.HOP_SYNC_APP_PRIVATE_KEY }}
          owner: hopmesh
          repositories: monorepo
          permission-actions: write
      - name: Ask the monorepo to import this PR
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
        run: |
          gh workflow run sync-components.yml \
            --repo hopmesh/monorepo \
            -f component=libhop \
            -f direction=import
