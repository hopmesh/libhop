# cbindgen config for libhop — generates include/hop.h (the C ABI / universal client SDK).
# Run:  cbindgen --config cbindgen.toml --crate hop --output include/hop.h
# Only the `cabi` module's `#[no_mangle] extern "C"` items + HopLinkRole are exported; the UniFFI
# surface and hop-core internals are NOT (parse_deps = false, and only C-ABI symbols are no_mangle).

language = "C"
header = "/* libhop — the Hop client SDK + bearer contract. GENERATED by cbindgen; do not edit. */"
include_guard = "HOP_H"
pragma_once = true
cpp_compat = true
tab_width = 4
documentation = true
documentation_style = "c99"

[parse]
parse_deps = false        # don't descend into hop-core; HopNode stays opaque

[export]
include = ["HopLinkRole"]

[enum]
prefix_with_name = true   # HopLinkRole::Dialer -> HopLinkRole_Dialer

[defines]
